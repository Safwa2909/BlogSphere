{% extends "base.html" %}

{% block title %}Write - BlogSphere{% endblock %}

{% block content %}
<div class="editor-container">
    <h2>Create New Post</h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" required placeholder="Enter an interesting title...">
        </div>
        
        <div class="form-group">
            <label>Content</label>
            <textarea name="content" rows="15" required placeholder="Start writing your story..."></textarea>
        </div>
        
        <div class="form-group">
            <label>Upload Image (Optional)</label>
            <input type="file" name="image" accept="image/*">
            <small>Supported formats: PNG, JPG, JPEG, GIF (Max 16MB)</small>
        </div>
        
        <button type="submit" class="btn-primary">Publish Post</button>
    </form>
</div>
{% endblock %}
