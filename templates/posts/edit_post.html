{% extends "base.html" %}

{% block title %}Edit - BlogSphere{% endblock %}

{% block content %}
<div class="editor-container">
    <h2>Edit Post</h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" value="{{ post.title }}" required>
        </div>
        <div class="form-group">
            <label>Content</label>
            <textarea name="content" rows="15" required>{{ post.content }}</textarea>
        </div>
        <div class="form-group">
            <label>Update Image (Optional)</label>
            {% if post.image %}
            <div class="current-image">
                <img src="{{ url_for('uploaded_file', filename=post.image) }}" alt="Current Image">
                <small>Current image will be replaced if you upload a new one</small>
            </div>
            {% endif %}
            <input type="file" name="image" accept="image/*">
            <small>Supported formats: PNG, JPG, JPEG, GIF (Max 16MB)</small>
        </div>
        <button type="submit" class="btn-primary">Update Post</button>
        <a href="{{ url_for('post_detail', post_id=post.id) }}" class="btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
